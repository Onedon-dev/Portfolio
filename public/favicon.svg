<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00e6ff" />
      <stop offset="100%" stop-color="#ff00d4" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- dark rounded square background -->
  <rect width="128" height="128" rx="18" ry="18" fill="#071022" />

  <!-- soft gradient ring -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="url(#g)" stroke-width="2.5" opacity="0.18" />

  <!-- inner accent circle -->
  <circle cx="64" cy="64" r="36" fill="url(#g)" opacity="0.08" />

  <!-- Letter D with neon gradient and glow -->
  <g filter="url(#glow)">
    <path d="M48 36 L48 92 L72 92 C84 92 92 84 92 72 L92 56 C92 44 84 36 72 36 Z M60 44 L72 44 C78 44 82 48 82 56 L82 72 C82 80 78 84 72 84 L60 84 L60 44 Z" fill="url(#g)" />
  </g>

  <!-- small corner accent -->
  <rect x="12" y="12" width="8" height="8" rx="2" fill="#00e6ff" opacity="0.14" />
</svg>
